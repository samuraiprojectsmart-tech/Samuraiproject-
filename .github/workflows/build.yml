name: ⚔️ SamuraiBuilder — Build & Send JAR

on:
  workflow_dispatch:
      inputs:
            build_id:
                    description: 'Build ID dari website'
                            required: true
                                  zip_url:
                                          description: 'URL download ZIP dari website'
                                                  required: true
                                                        callback_url:
                                                                description: 'URL callback InfinityFree untuk terima JAR'
                                                                        required: true

                                                                        jobs:
                                                                          build:
                                                                              runs-on: ubuntu-latest
                                                                                  timeout-minutes: 10

                                                                                      steps:
                                                                                            - name: ☕ Setup Java 21
                                                                                                    uses: actions/setup-java@v4
                                                                                                            with:
                                                                                                                      java-version: '21'
                                                                                                                                distribution: 'temurin'
                                                                                                                                          cache: maven

                                                                                                                                                - name: 📥 Download ZIP dari website
                                                                                                                                                        run: |
                                                                                                                                                                  echo "Build ID : ${{ github.event.inputs.build_id }}"
                                                                                                                                                                            echo "ZIP URL  : ${{ github.event.inputs.zip_url }}"
                                                                                                                                                                                      curl -L -f -o project.zip "${{ github.event.inputs.zip_url }}"
                                                                                                                                                                                                ls -lh project.zip

                                                                                                                                                                                                      - name: 📂 Extract ZIP
                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                        unzip -q project.zip -d workspace/
                                                                                                                                                                                                                                  ls -la workspace/

                                                                                                                                                                                                                                        - name: ⚙️ Build Maven / Gradle
                                                                                                                                                                                                                                                id: build
                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                  cd workspace
                                                                                                                                                                                                                                                                            TOP=$(ls -1 | head -1)
                                                                                                                                                                                                                                                                                      if [ -d "$TOP" ] && [ $(ls | wc -l) -eq 1 ]; then
                                                                                                                                                                                                                                                                                                  cd "$TOP"
                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                      echo "build_dir=$(pwd)" >> $GITHUB_OUTPUT

                                                                                                                                                                                                                                                                                                                                if [ -f "pom.xml" ]; then
                                                                                                                                                                                                                                                                                                                                            echo "build_type=maven" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                        mvn clean package -DskipTests --no-transfer-progress -B 2>&1 | tee /tmp/build.log

                                                                                                                                                                                                                                                                                                                                                                  elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
                                                                                                                                                                                                                                                                                                                                                                              echo "build_type=gradle" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                          if [ -f "gradlew" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                        chmod +x gradlew
                                                                                                                                                                                                                                                                                                                                                                                                                      ./gradlew clean build -x test --no-daemon 2>&1 | tee /tmp/build.log
                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                gradle clean build -x test --no-daemon 2>&1 | tee /tmp/build.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi

                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "ERROR: Tidak ada pom.xml atau build.gradle!" | tee /tmp/build.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Kirim notif gagal ke website
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          curl -X POST "${{ github.event.inputs.callback_url }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -F "build_id=${{ github.event.inputs.build_id }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -F "status=failed" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -F "error=Tidak ada pom.xml atau build.gradle" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --max-time 30 || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: 🔍 Cari JAR
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      id: jar
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        BUILD="${{ steps.build.outputs.build_dir }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  JAR=$(find "$BUILD/target" "$BUILD/build/libs" -name "*.jar" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ! -name "*-sources.jar" ! -name "*-javadoc.jar" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ! -name "original-*.jar" ! -name "*-plain.jar" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      2>/dev/null | xargs ls -S 2>/dev/null | head -1)

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if [ -z "$JAR" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            curl -X POST "${{ github.event.inputs.callback_url }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -F "build_id=${{ github.event.inputs.build_id }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -F "status=failed" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -F "error=Build sukses tapi JAR tidak ditemukan" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -F "log=$(cat /tmp/build.log | tail -50 | base64 -w 0)" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --max-time 30 || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "jar=$JAR" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "jar_name=$(basename $JAR)" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "✔ JAR: $(basename $JAR) ($(du -sh $JAR | cut -f1))"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: 📤 Kirim JAR ke InfinityFree
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Mengirim JAR ke: ${{ github.event.inputs.callback_url }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        curl -X POST "${{ github.event.inputs.callback_url }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -F "build_id=${{ github.event.inputs.build_id }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -F "status=success" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -F "jar_name=${{ steps.jar.outputs.jar_name }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -F "jar=@${{ steps.jar.outputs.jar }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    --max-time 120
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "✔ JAR berhasil dikirim!"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              